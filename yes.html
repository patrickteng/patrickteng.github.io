<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAAAS! 🎉 — Patrick &amp; Wen Cheen ROM</title>
  <meta name="description" content="Thank you for confirming your attendance at Patrick and Wen Cheen's ROM ceremony!">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <main class="page">
    <div class="response-page yes-page">

      <div class="response-page__emoji">🎉</div>

      <h1 class="response-page__heading script-heading">OMG YAAAS!</h1>

      <p class="response-page__subheading">You're literally the best</p>

      <div class="hype-words" aria-label="Celebration words">
        <span class="hype-word">SLAY!! 💅</span>
        <span class="hype-word">IT'S GIVING ✨</span>
        <span class="hype-word">ICONIC 👑</span>
        <span class="hype-word">PERIODT 💯</span>
        <span class="hype-word">NO CAP 🔥</span>
        <span class="hype-word">BESTIE 💖</span>
      </div>

      <p class="response-page__body">
        We're SO excited to celebrate with you! 🥹<br>
        Redirecting you to WhatsApp to let us know...
      </p>

      <div class="response-page__action">
        <a href="#" id="whatsapp-btn" class="btn btn--whatsapp btn--lg">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Send via WhatsApp
        </a>
      </div>

      <p class="redirect-notice" id="redirect-notice">
        Auto-redirecting in <span id="countdown">5</span>s...
      </p>

    </div>
  </main>

  <script>
    // =============================================
    //  IMPORTANT: Replace YOUR_PHONE_NUMBER below
    //  with the couple's WhatsApp number including
    //  country code, e.g. 60123456789 (no + or spaces)
    // =============================================
    const WHATSAPP_NUMBER = '601126605919'; // e.g. '60123456789'
    const WHATSAPP_MESSAGE = encodeURIComponent("Yes I'm planning to attend your ROM!! 🎉");

    const whatsappUrl = WHATSAPP_NUMBER
      ? `https://wa.me/${WHATSAPP_NUMBER}?text=${WHATSAPP_MESSAGE}`
      : `https://wa.me/?text=${WHATSAPP_MESSAGE}`;

    // Set the WhatsApp button href
    document.getElementById('whatsapp-btn').href = whatsappUrl;

    // Countdown & auto-redirect
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');
    const timer = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = whatsappUrl;
      }
    }, 1000);

    // =============================================
    //  Confetti 🎊
    // =============================================
    (function () {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      const particles = [];
      const colors = ['#d4a853', '#f0d48a', '#e8a0b4', '#c77a92', '#93c5fd', '#6ee7b7', '#fdba74', '#c4b5fd', '#fff'];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function Particle() {
        this.x = Math.random() * W;
        this.y = Math.random() * H - H;
        this.w = 5 + Math.random() * 6;
        this.h = 3 + Math.random() * 4;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.vy = 1.5 + Math.random() * 3;
        this.vx = -1 + Math.random() * 2;
        this.angle = Math.random() * Math.PI * 2;
        this.va = -0.05 + Math.random() * 0.1;
        this.opacity = 0.7 + Math.random() * 0.3;
      }

      for (let i = 0; i < 120; i++) {
        particles.push(new Particle());
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();

          p.y += p.vy;
          p.x += p.vx;
          p.angle += p.va;
          p.opacity -= 0.002;

          if (p.y > H + 20 || p.opacity <= 0) {
            p.x = Math.random() * W;
            p.y = -10;
            p.opacity = 0.7 + Math.random() * 0.3;
          }
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>

</body>
</html>
